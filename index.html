<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tabla de posiciones de una liga de juegos de mesa."
    />
    <title>La Liga de la Medianoche 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card hero">
        <p class="eyebrow">Liga de juegos de mesa</p>
        <h1>La Liga de la Medianoche 2026</h1>
        <p class="subtitle">
          Clasificación general de la temporada. Los puntajes se actualizan
          directamente desde <code>scores.js</code>.
        </p>
      </section>

      <section class="card standings">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Tabla de posiciones</p>
            <h2>Ranking actual</h2>
          </div>
          <span class="badge" id="player-count">0 jugadores</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Pos.</th>
                <th>Jugador</th>
                <th>Puntaje total</th>
              </tr>
            </thead>
            <tbody id="score-table"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="scores.js"></script>
  </body>
</html>
